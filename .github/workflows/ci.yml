name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Berlin
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - run: bunx vercel build --prod --token=$VERCEL_TOKEN
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - run: bunx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  version:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Bump version based on commit message
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qiE '^feat(\(|:|!)'; then
            BUMP="minor"
          elif echo "$MSG" | grep -qiE '^(fix|bug)(\(|:|!)'; then
            BUMP="patch"
          elif echo "$MSG" | grep -qiE '^(chore|proj|docs|style|refactor|test|ci|build|perf|revert)(\(|:|!)'; then
            BUMP="patch"
          else
            echo "No conventional commit prefix found, skipping version bump"
            exit 0
          fi

          echo "Bumping version: $BUMP"
          NEW_VERSION=$(npm version $BUMP --no-git-tag-version)
          echo "New version: $NEW_VERSION"

          # Skip if this version was already tagged (e.g. retry after partial failure)
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEW_VERSION already exists, skipping"
            exit 0
          fi

          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "$NEW_VERSION"
          git push origin main --tags
      - name: Create GitHub release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="v$(node -p "require('./package.json').version")"
          # Skip if release already exists
          if gh release view "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Release $NEW_VERSION already exists, skipping"
            exit 0
          fi
          MSG=$(git log -2 --pretty=%s | tail -1)
          gh release create "$NEW_VERSION" --title "$NEW_VERSION" --notes "$MSG" --latest
