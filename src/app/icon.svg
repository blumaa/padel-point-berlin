      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#18181b"/>
  <g clip-path="url(#c)">
    <!-- Court lines -->
    <line x1="200" y1="-10" x2="200" y2="522" stroke="#06b6d4" stroke-width="10" opacity="0.4"/>
    <line x1="200" y1="310" x2="522" y2="310" stroke="#06b6d4" stroke-width="10" opacity="0.4"/>
  </g>
